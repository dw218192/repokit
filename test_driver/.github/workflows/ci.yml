name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Bootstrap
        run: tools/framework/bootstrap.sh

      - name: Build
        run: ./repo build

      - name: Test
        run: ./repo test
