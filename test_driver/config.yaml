repo:
  extra_deps:
    - pytest>=7.0
    - pytest-cov>=4.0
  tokens:
    coverage_flags: "--cov=repo_tools --cov-report=term-missing --cov-report=markdown:{workspace_root}/coverage.md"

test:
  steps:
    - "{repo} python -m pytest {workspace_root}/tests/"

test-cov:
  steps:
    - "{repo} python -m pytest {workspace_root}/tests/ {coverage_flags}"

agent:
  debug_hooks: false
  backend: "sdk"
  human_ticket_review: true
  events:
    test_timer:
      tick:
        poll:
          - "{repo} python -c \"import sys; sys.exit(0)\""
        payload:
          - "{repo} python -c \"import datetime; print(datetime.datetime.utcnow().isoformat())\""
        interval: 3600
        description: "Periodic timer (test)"
  required_criteria+:
    - "All existing tests pass (run via `repo_test`)"
    - "No coverage regression (run via `repo_test-cov`)"
    - "New features must have tests; tests must cover meaningful behavior, not trivial plumbing"
    - "Stay true to the principles specified in @repo_tools/agent/prompts/common.txt"
    - "Dogfooding as much as possible: use the repo tool's core features to implement a new feature. DRY."