# Default agent command allowlist for repokit-managed repositories.
# Override with agent.allowlist in config.yaml.
#
# Rules support two matching fields (at least one required):
#   commands = ["rm", "git"]   — exact command names (auto-wrapped as ^name\b)
#   patterns = ['git\s+push']  — raw regex for complex matches

default_reason = "try another approach"

# ── Deny rules ───────────────────────────────────────────────────────

[[deny]]
name = "agent_dir"
patterns = ["\\b_agent[/\\\\](?!worktrees[/\\\\])"]
roles = ["worker", "reviewer"]
reason = "subagents cannot modify _agent/ — relay updates to the orchestrator via the send_message MCP tool"

[[deny]]
name = "plugin_dir"
patterns = ["_agent[/\\\\]plugin"]
reason = "plugin directories are managed by the framework — do not modify directly"

[[deny]]
name = "destructive"
commands = ["rm", "rmdir", "del"]
dir = "!project_root"
reason = "destructive file operations are only allowed within the project tree"

[[deny]]
name = "admin"
commands = ["sudo", "su", "runas"]
reason = "elevated privilege commands are not permitted"

[[deny]]
name = "worktree_merge"
patterns = ['^git\s+merge\s+worktree-']
reason = "worktree branches are merged automatically by the ticket lifecycle — use update_ticket to transition verify → merged"

[[deny]]
name = "git_rewrite"
patterns = [
    'git\s+push\s.*--force',
    'git\s+push\s+-f\b',
    'git\s+reset\s+--hard',
    'git\s+rebase\b(?!\s+--(continue|abort|skip))',
    'git\s+commit\s.*--amend',
    'git\s+filter-branch',
    'git\s+reflog\s+expire',
    'git\s+reflog\s+delete',
]
reason = "destructive git history rewrites are not permitted — commit and push normally"

[[deny]]
name = "subshell"
commands = ["bash", "sh"]
reason = "subshells bypass the command allowlist — run commands directly instead"

[[deny]]
name = "network_cli"
commands = ["curl", "wget"]
reason = "use the WebFetch or WebSearch tools instead of CLI network commands"

[[deny]]
name = "env_dump"
commands = ["env", "printenv"]
reason = "environment variables may contain secrets — use specific tools to inspect configuration"

[[deny]]
name = "polling"
commands = ["sleep", "watch"]
reason = "polling and sleep loops are not permitted — find another approach"

# ── Allow rules ──────────────────────────────────────────────────────

[[allow]]
name = "repo-tools"
patterns = ['^\./repo\b']
dir = "project_root"

[[allow]]
name = "file_inspection"
commands = ["cat", "head", "tail", "less", "wc", "file", "type"]

[[allow]]
name = "navigation"
commands = ["cd", "ls", "dir", "tree", "find", "fd"]

[[allow]]
name = "search"
commands = ["grep", "rg", "findstr", "ag"]

[[allow]]
name = "shell"
commands = ["echo", "printf", "test", "true", "false", "expr"]
patterns = ['^\[']

[[allow]]
name = "text_processing"
commands = ["xargs", "sort", "uniq", "cut", "awk", "sed", "tr", "tee"]

[[allow]]
name = "system_info"
commands = ["which", "where", "pwd", "whoami", "date", "uname"]

[[allow]]
name = "version_control"
commands = ["git", "gh"]

[[allow]]
name = "destructive_in_project"
commands = ["rm", "rmdir", "del"]
dir = "project_root"

[[allow]]
name = "control_flow"
commands = ["for", "if", "while", "case"]

# ── PowerShell rules ─────────────────────────────────────────────────
# Existing rules above also apply to PowerShell — `git`, `rm`, etc.
# match because PS aliases (rm → Remove-Item, ls → Get-ChildItem) are
# resolved before the regex check via segment text.

[[deny]]
name = "powershell_network_cli"
commands = ["Invoke-WebRequest", "Invoke-RestMethod", "iwr", "irm"]
reason = "use the WebFetch or WebSearch tools instead of CLI network commands"

[[deny]]
name = "powershell_polling"
commands = ["Start-Sleep", "Wait-Event"]
reason = "polling and sleep loops are not permitted — find another approach"

[[deny]]
name = "powershell_subshell"
commands = ["pwsh", "powershell"]
reason = "nested shells bypass the command allowlist — run commands directly instead"

[[allow]]
name = "powershell_inspection"
commands = [
    "Get-ChildItem", "Get-Content", "Test-Path", "Resolve-Path",
    "Get-Location", "Get-Date", "Get-Item", "Select-String",
    "Where-Object", "ForEach-Object", "Select-Object",
    "Sort-Object", "Measure-Object", "Group-Object",
    "Out-String", "Format-Table", "Format-List", "Out-Null",
    "Set-Location", "Write-Output", "Write-Host",
]

[[allow]]
name = "powershell_destructive_in_project"
commands = ["Remove-Item"]
dir = "project_root"
